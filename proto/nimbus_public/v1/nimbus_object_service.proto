syntax = "proto3";

package nimbus_public.v1;

import "nimbus_public/v1/types.proto";

service NimbusPublicService {
  // Upload the bytes.
  rpc PutObject(stream PutObjectRequest) returns (PutObjectResponse);

  // Read the bytes from the data.
  rpc GetObject(GetObjectRequest) returns (stream GetObjectResponse);

  // Delete an object.
  rpc DeleteObject(DeleteObjectRequest) returns (DeleteObjectResponse);

  // Update the access type of the object PUBLIC/PRIVATE.
  rpc UpdateAccessType(UpdateAccessTypeRequest) returns (UpdateAccessTypeResponse);

  // If a valid directory found then returns it objects.
  rpc GetDirectoryContent(GetDirectoryContentRequest) returns (GetDirectoryContentResponse);

  // The file id looks like files/names.txt
  rpc FindObjectById(FindObjectByIdRequest) returns (FindObjectByIdResponse);

  // Update the move, replace if file already exist.
  rpc RenameFile(RenameFileRequest) returns (RenameFileResponse);

  // Copy the file to another location.
  rpc CopyFile(CopyFileRequest) returns (CopyFileResponse);
}

// Stream of bytes of the file.
message PutObjectRequest {
  bytes data = 1;
}

// After sending the bytes either getting the object response or the error message from the server.
message PutObjectResponse {
  nimbus_public.v1.ObjectDetails object_details = 1;
}

// Object id is like the file id, this id must be a file path not a directory or invalid file name.
message GetObjectRequest {
  string object_id = 1;
}

message GetObjectResponse {
  bytes data = 1;
}

// Delete objects
message DeleteObjectRequest {
  repeated string object_ids = 1;
}
message DeleteObjectResponse {
  repeated string object_ids = 1;
}

// Update access type
message UpdateAccessTypeRequest {
  repeated string object_ids = 1;
  nimbus_public.v1.AccessType access_type = 2;
}

message UpdateAccessTypeResponse {
  // The access information of an object it can be used via public url or only access using personal access token.
  message ObjectAccessInfo {
    string object_id = 1;
    nimbus_public.v1.AccessType access_type = 2;
    optional string access_url = 3;
  }
  repeated ObjectAccessInfo object_access_info = 1;
}

// Get directory content.
message GetDirectoryContentRequest {
  // If no directory given returns the root system.
  optional string object_id = 1;
  string off_set = 2;
  string count = 3;
}

message GetDirectoryContentResponse {
  message ObjectInfo {
    string object_id = 1;
    nimbus_public.v1.AccessType access_type = 2;
    nimbus_public.v1.ObjectType object_type = 3;
    string content_type = 4;
    string created_on = 5;
  }
  uint64 object_count = 1;
  repeated ObjectInfo objects = 4;
}

// Find object by id
message FindObjectByIdRequest {
  string object_id = 1;
}
message FindObjectByIdResponse {
  nimbus_public.v1.ObjectDetails object = 1;
}

// RenameFile
message RenameFileRequest {
  repeated string object_ids = 1;
  optional string destination = 2;
}

message RenameFileResponse {
  repeated string object_ids = 1;
}

// Copy files
message CopyFileRequest {
  repeated string object_ids = 1;
  optional string destination = 2;
}
message CopyFileResponse {
  repeated string object_ids = 1;
}
