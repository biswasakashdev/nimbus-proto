syntax = "proto3";

package nimbus.v1;

import "nimbus/v1/types/v1/files.proto";

// This service is only to used to send and recive the raw data bytes.
service NimbusVaultObjectService {

  rpc CreateOrUpdateObject(stream CreateOrUpdateObjectRequest) returns (CreateOrUpdateObjectResponse);

  rpc GetObject(GetObjectRequest) returns (stream GetObjectResponse);

}

// Status represents the status of an operation.
enum Status {
  STATUS_UNSPECIFIED = 0;
  STATUS_FAILED = 1;
  STATUS_SUCCESS = 2;
}

// Stream of bytes of the file.
message CreateOrUpdateObjectRequest {
  bytes data = 1;
}

// After sending the bytes either getting the object response or the error message from the server.
message CreateOrUpdateObjectResponse {
  oneof response {
    string error_message = 2;
    nimbus.v1.types.v1.ObjectDetails object_details = 3;
  }
}

// Object id is like the file id, this id must be a file path not a directory or invalid file name.
message GetObjectRequest {
  string object_id = 1;
}

// The stream of bytes of the file.
message GetObjectResponse {
  bytes data = 1;
}
