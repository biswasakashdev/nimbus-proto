syntax = "proto3";

package nimbus_types.v1;

// Either a file or a directory.
enum ObjectType {
  OBJECT_TYPE_UNSPECIFIED = 0;
  OBJECT_TYPE_FILE = 1;
  OBJECT_TYPE_DIRECTORY = 2;
}

// Either Public or Private
enum AccessType {
  ACCESS_TYPE_UNSPECIFIED = 0;
  ACCESS_TYPE_PRIVATE = 1;
  ACCESS_TYPE_PUBLIC = 2;
}

// The details of any object it can be file or a directory and the access url if the object is public otherwise it can be only access via personal access token.
message ObjectDetails {
  ObjectType object_type = 1;
  string object_id = 2;
  uint64 object_size = 3;
  AccessType access_type = 4;
  string created_on = 5;
  // image/jpeg, image/png, text/plain
  string content_type = 6;

  map<string, string> meta_data = 7;
  // The access url of a directory is referd as static directory which serve static contents.
  optional string access_url = 8;
}
