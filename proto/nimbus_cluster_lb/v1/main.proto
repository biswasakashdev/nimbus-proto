syntax = "proto3";

package nimbus_cluster_lb.v1;

import "nimbus_types/v1/main.proto";

service UrlGeneratorService {
  rpc GetUrl(GetUrlRequest) returns (GetUrlResponse);
}

message GetUrlRequest {
  string object_id = 1;
  nimbus_types.v1.AccessType access_type = 2;
}

message GetUrlResponse {
  string url = 1;
}
